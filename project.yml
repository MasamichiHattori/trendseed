name: TrendSeedMock
options:
  bundleIdPrefix: com.trendseed
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    PRODUCT_BUNDLE_IDENTIFIER: com.trendseed.mobile
    GENERATE_INFOPLIST_FILE: NO
    INFOPLIST_FILE: TrendSeedMock/Info.plist
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0
    CODE_SIGN_STYLE: Automatic
packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads.git
    from: 13.6.0
targets:
  TrendSeedMock:
    type: application
    platform: iOS
    dependencies:
      - package: GoogleMobileAds
        product: GoogleMobileAds
    sources:
      - TrendSeedMock
    resources:
      - Secrets.xcconfig
      - TrendSeedMock/Assets.xcassets
      - TrendSeedMock/StoreKit/TrendSeedMock.storekit
    configFiles:
      Debug: Secrets.xcconfig
      Release: Secrets.xcconfig
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1"
    scheme:
      testTargets: []
